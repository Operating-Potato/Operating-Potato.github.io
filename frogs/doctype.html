<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricetag</title>
    <link rel="stylesheet" href="Doctype.css">
</head>
<body>
    <center><h3>Okay, let's talk price.</h3></center>
    <img src="look at this.jpg"width="700px"height="500px"><br>
    <center><i>Frogs cost one square sticky note each. <br><Center><h2>Offers</h2></Center>The first frog you buy is free of charge. </i></center><br>
    
    <section>
        <form action="">
            <p class="qty">
                <label for="qty">Quantity:</label>
                <button class="qtyminus" aria-hidden="true">&minus;</button>
                <input type="number" name="qty" id="qty" min="1" max="10" step="1" value="1">
                <button class="qtyplus" aria-hidden="true">&plus;</button>

            </p>
        </form>			
    </section>
    <h4>If you would like to buy a frog, please visit Charles Ai in grades 6A.<br></h4><center>warning</center> Remember that the quantity above is used only to remember about how many frogs you will buy.</center></h4>

</body>

</html>
